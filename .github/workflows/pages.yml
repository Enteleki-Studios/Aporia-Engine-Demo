name: Deploy to pages

on:
    push:
        branches: ['main']
env:
    HUSKY: 0
    STORYBOOK_DISABLE_TELEMETRY: true

permissions:
    id-token: write

concurrency:
    group: 'deployment'
    cancel-in-progress: true

jobs:
    checks:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 25

            - name: Install
              run: npm ci

            - name: Test
              run: npm run test

    build:
        needs: checks
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 25

            - name: Install
              run: npm ci

            - name: Build
              run: npm run build

            - name: Upload static files as artifact
              id: deployment
              uses: actions/upload-pages-artifact@v3
              with:
                  path: dist
    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
