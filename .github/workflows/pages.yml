name: Deploy to pages

on:
    push:
        branches: ['main']
env:
    HUSKY: 0
    STORYBOOK_DISABLE_TELEMETRY: true
    NODE_VERSION: 'lts/*'
    PACKAGE_MANAGER: 'npm'

concurrency:
    group: 'deployment'
    cancel-in-progress: true

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: ${{env.NODE_VERSION}}
                  cache: ${{env.PACKAGE_MANAGER}}
            - run: npm ci
            - run: npm run test

    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: ${{env.NODE_VERSION}}
                  cache: ${{env.PACKAGE_MANAGER}}
            - run: npm ci
            - run: npm run lint

    format:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: ${{env.NODE_VERSION}}
                  cache: ${{env.PACKAGE_MANAGER}}
            - run: npm ci
            - run: npm run format:check

    build:
        needs:
            - test
            - lint
            - format
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: ${{env.NODE_VERSION}}
                  cache: ${{env.PACKAGE_MANAGER}}
            - run: npm ci
            - run: npm run build

            - name: Upload artifact
              id: deployment
              uses: actions/upload-pages-artifact@v5
              with:
                  path: dist

    deploy:
        needs: build
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pages: write
            id-token: write
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v5
