name: Build

on:
    push:
        branches: ['main']
    pull_request:
        branches: ['main']
env:
    HUSKY: 0

jobs:
    build:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                node-version: [24.x]

        steps:
            - uses: actions/checkout@v4

            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}

            - name: Install
              run: npm ci

            - name: Build
              run: npm run build

            - name: Test
              run: npm run test

            - name: Lint
              run: npm run lint

            - name: Prettier
              run: npm run prettier-check
