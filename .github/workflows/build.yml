name: Build Dungeon

on:
    push:
        branches: ['main']
    pull_request:
        branches: ['main']

jobs:
    build:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                node-version: [18.x]

        steps:
            - uses: actions/checkout@v3

            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v3
              with:
                  node-version: ${{ matrix.node-version }}

            - name: NPM Install
              run: |
                  npm install

            - name: Build Gengine
              run: |
                  npm run build -w gengine

            - name: Build Dungeon
              run: |
                  npm run build -w dungeon
